  scheduler:
    build:
      context: ../../
      dockerfile: deploy/prod/Dockerfile
    container_name: frontis_prod_scheduler
    restart: always
    working_dir: /var/www
    volumes:
      - ./storage:/var/www/storage
    depends_on:
      - db
      - redis
    env_file:
      - ../../.env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      REVERB_HOST: reverb
      REVERB_PORT: 8080
