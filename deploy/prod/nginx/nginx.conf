upstream octane {
    server app:8000;
    keepalive 64;
}

upstream reverb {
    server reverb:8080;
    keepalive 4;
}

server {
    listen 80;
    server_name _;

    root /var/www/public;
    index index.html;

    client_max_body_size 512M;

    # Reverb WebSocket: Pusher client uses /app/{key} by default
    location /app {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_pass http://reverb;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
    }

    # Reverb WebSocket and API (alternate path /reverb -> Reverb expects /app)
    location /reverb {
        rewrite ^/reverb(.*)$ /app$1 break;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_pass http://reverb;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_buffering off;
        proxy_cache off;
    }

    # Proxy all other requests to Octane
    location / {
        try_files $uri @octane;
    }

    location @octane {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://octane;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
    }

    location /storage {
        alias /var/www/storage/app/public;
        try_files $uri =404;
        access_log off;
        expires max;
        add_header Cache-Control "public, immutable";
        autoindex off;
    }

    location ~ ^/storage/app/private {
        deny all;
        return 404;
    }

    location ~ ^/storage/app {
        deny all;
        return 404;
    }

    location ~ /\. {
        deny all;
    }

    location ~ ^/(\.env|\.git|composer\.(json|lock)|package(-lock)?\.json|yarn\.lock) {
        deny all;
        return 404;
    }
}
